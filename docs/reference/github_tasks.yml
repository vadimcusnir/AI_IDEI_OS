repository: vadimcusnir/AI_IDEI_OS
issues:
- title: Implement checkAccess canonical function
  body: '

    **Module:** Platform Core - Access Control


    Implement a canonical access control function `checkAccess(user, resource, context)`
    that returns one of three verdicts: ALLOW, PAYWALL, or DENY. This service must
    be consumed by UI components without exposing internal logic. Include the following
    subtasks:


    - Define access policy schema

    - Implement entitlement resolver

    - Implement policy rules

    - Implement reason codes

    - Integrate with UI verdict system

    '
  labels:
  - platform-core
  - access-control
  - urgent
- title: Implement Access Simulator
  body: '

    **Module:** Platform Core - Access Control


    Implement an Access Simulator to predict access outcomes. The simulator should
    be able to snapshot a user’s access state and simulate service access outcomes,
    providing reason codes and a UI visualization for locked services.


    Subtasks:


    - Snapshot user access state

    - Simulate service access outcomes

    - Implement reason code mapping

    - Create UI visualization for locked services

    '
  labels:
  - platform-core
  - access-control
  - high
- title: Implement immutable decision ledger
  body: '

    **Module:** Platform Core - Decision Ledger


    Build an immutable decision ledger that records all critical system decisions,
    including access denials, abuse events, and economic actions. This should include
    creating the decision_ledger table, enforcing an append-only constraint, and building
    logging hooks and an audit viewer.


    Subtasks:


    - Create decision_ledger table

    - Implement append-only constraint

    - Create logging hooks

    - Build audit viewer

    '
  labels:
  - platform-core
  - decision-ledger
  - urgent
- title: Integrate ledger with access system
  body: '

    **Module:** Platform Core - Decision Ledger


